openapi: 3.0.3
info:
  title: Questionnary REST API
  description: |
    HTTP-JSON-API für Authentifizierung, Themen (Topics), Umfragen (Surveys) und Nutzerlisten.
    Entspricht den Express-Routen unter `src/routes/`.
  version: 1.0.0

servers:
  - url: http://localhost:3001
    description: Lokale Entwicklung (Standard-Port aus `server.ts`)
  - url: http://localhost:5173/api
    description: Über Vite-Dev-Proxy (Pfad `/api` wird zum Backend-Root umgeschrieben)

tags:
  - name: Auth
    description: Registrierung und Anmeldung
  - name: Topics
    description: Themen und Zugriffsmitglieder
  - name: Surveys
    description: Umfragen, Fragen, Antworten
  - name: Users
    description: Nutzer (ohne Passwort)

paths:
  /authorize-user:
    post:
      tags: [Auth]
      summary: Nutzer anmelden
      operationId: authorizeUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizationRequest'
      responses:
        '200':
          description: Erfolg – öffentliche Nutzerdaten (ohne Passwort)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Benutzername oder Passwort ungültig
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundError'

  /register-user:
    post:
      tags: [Auth]
      summary: Nutzer registrieren
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '200':
          description: Erfolg
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          description: Validierungsfehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Benutzername bereits vergeben
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAlreadyExistsError'

  /list-topics:
    get:
      tags: [Topics]
      summary: Themen für einen Nutzer auflisten
      operationId: listTopics
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Nutzer-ID (Zugriff über `access_topic`)
        - name: title
          in: query
          required: false
          schema:
            type: string
          description: Optionaler Filter (enthält-Text im Titel)
      responses:
        '200':
          description: Liste der Themen
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SerializedTopic'
        '400':
          description: Ungültige `userId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Interner Fehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

  /topic-by-id:
    get:
      tags: [Topics]
      summary: Ein Thema nach ID
      operationId: getTopicById
      parameters:
        - name: topicId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Genau ein Thema als Array (`[topic]`), wie in der Implementierung.
          content:
            application/json:
              schema:
                type: array
                minItems: 1
                maxItems: 1
                items:
                  $ref: '#/components/schemas/SerializedTopic'
        '400':
          description: Ungültige `topicId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Thema nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /topic-members:
    get:
      tags: [Topics]
      summary: Mitglieder mit Zugriff auf ein Thema
      operationId: listTopicMembers
      parameters:
        - name: topicId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Liste öffentlicher Nutzerdaten
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicUser'
        '400':
          description: Ungültige `topicId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Thema existiert nicht
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'
        '500':
          description: Interner Fehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

  /create-topic:
    post:
      tags: [Topics]
      summary: Thema anlegen
      operationId: createTopic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopicRequest'
      responses:
        '200':
          description: Angelegtes Thema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SerializedTopic'
        '400':
          description: Validierung oder fehlender Admin (`adminUserId` / `userIds`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Interner Fehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

  /update-topic:
    put:
      tags: [Topics]
      summary: Thema aktualisieren
      operationId: updateTopic
      parameters:
        - name: topicId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopicRequest'
      responses:
        '200':
          description: Aktualisiertes Thema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SerializedTopic'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Thema nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /list-surveys:
    get:
      tags: [Surveys]
      summary: Umfragen zu einem Thema
      operationId: listSurveys
      parameters:
        - name: topicId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Liste (Metadaten, ohne Fragen)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SerializedSurvey'
        '400':
          description: Ungültige `topicId`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /survey-fill-status:
    get:
      tags: [Surveys]
      summary: Ausfüllstatus einer Umfrage für einen Nutzer
      operationId: getSurveyFillStatus
      parameters:
        - name: surveyId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyFillStatus'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Umfrage nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /survey-by-id:
    get:
      tags: [Surveys]
      summary: Umfrage inkl. Fragen und Optionen
      operationId: getSurveyById
      parameters:
        - name: surveyId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Umfrage mit `questions` und je Frage `Options` (Schreibweise wie API)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyDetail'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /create-survey:
    post:
      tags: [Surveys]
      summary: Umfrage anlegen
      operationId: createSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSurveyRequest'
      responses:
        '200':
          description: Angelegte Umfrage (Metadaten, ohne eingebettete Fragen in der Antwort)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SerializedSurvey'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Thema (`topicId`) existiert nicht
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /update-survey:
    put:
      tags: [Surveys]
      summary: Umfrage aktualisieren
      operationId: updateSurvey
      parameters:
        - name: surveyId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSurveyRequest'
      responses:
        '200':
          description: Aktualisierte Umfrage (Metadaten)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SerializedSurvey'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Umfrage nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessFalse'

  /submit-survey-answers:
    post:
      tags: [Surveys]
      summary: Umfrageantworten absenden (eine Option pro Frage)
      operationId: submitSurveyAnswers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSurveyAnswersRequest'
      responses:
        '200':
          description: Erfolgreich gespeichert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSuccess'
        '400':
          description: Validierung oder fachlicher Fehler (siehe `error`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSurveyError'
        '404':
          description: Umfrage nicht gefunden (`survey_not_found`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSurveyError'
        '409':
          description: Umfrage bereits vollständig ausgefüllt (`already_completed`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitSurveyError'

  /delete-survey:
    delete:
      tags: [Surveys]
      summary: Umfrage löschen (nur Ersteller)
      operationId: deleteSurvey
      parameters:
        - name: surveyId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Muss mit dem Ersteller der Umfrage (`user_id`) übereinstimmen
      responses:
        '200':
          description: Gelöscht
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '400':
          description: Validierung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '403':
          description: Nicht der Ersteller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteForbidden'
        '404':
          description: Umfrage nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteNotFound'

  /list-users:
    get:
      tags: [Users]
      summary: Alle Nutzer auflisten (ohne Passwort)
      operationId: listUsers
      responses:
        '200':
          description: Sortiert nach `id`
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicUser'
        '500':
          description: Interner Fehler
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

components:
  schemas:
    AuthorizationRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    RegistrationRequest:
      type: object
      required: [firstname, lastname, username, password]
      properties:
        firstname:
          type: string
          minLength: 1
        lastname:
          type: string
          minLength: 1
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    PublicUser:
      type: object
      required: [id, username, firstname, lastname]
      properties:
        id:
          type: integer
        username:
          type: string
        firstname:
          type: string
        lastname:
          type: string

    SerializedTopic:
      type: object
      required: [id, title, description, adminUserId, adminUserName, createDate]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        adminUserId:
          type: integer
          description: Entspricht `user_id` des Topic-Besitzers
        adminUserName:
          type: string
        createDate:
          type: integer
          format: int64
          description: Unix-Zeit in Sekunden (`created_at`)

    SerializedSurvey:
      type: object
      required: [id, title, description, adminUserId, adminUserName, createDate]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        adminUserId:
          type: integer
        adminUserName:
          type: string
        createDate:
          type: integer
          format: int64
          description: Unix-Zeit in Sekunden

    SurveyOption:
      type: object
      required: [id, value]
      properties:
        id:
          type: integer
        value:
          type: string

    SurveyQuestion:
      type: object
      required: [id, title, Options]
      properties:
        id:
          type: integer
        title:
          type: string
          description: Entspricht `question_text` in der DB
        Options:
          type: array
          items:
            $ref: '#/components/schemas/SurveyOption'

    SurveyDetail:
      allOf:
        - $ref: '#/components/schemas/SerializedSurvey'
        - type: object
          required: [questions]
          properties:
            questions:
              type: array
              items:
                $ref: '#/components/schemas/SurveyQuestion'

    SurveyFillStatus:
      type: object
      required: [alreadyCompleted]
      properties:
        alreadyCompleted:
          type: boolean

    CreateTopicRequest:
      type: object
      required: [title, description, userIds]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        userIds:
          type: array
          items:
            type: integer
            minimum: 1
        adminUserId:
          type: integer
          minimum: 1
          description: Optional; sonst erster Eintrag in `userIds`

    CreateSurveyRequest:
      type: object
      required: [title, description, adminUserId, topicId, questions]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        adminUserId:
          type: integer
          minimum: 1
        topicId:
          type: integer
          minimum: 1
        questions:
          type: array
          items:
            type: object
            required: [title, Options]
            properties:
              title:
                type: string
                minLength: 1
              Options:
                type: array
                items:
                  type: object
                  required: [value]
                  properties:
                    value:
                      type: string
                      minLength: 1

    UpdateSurveyRequest:
      type: object
      required: [title, description, questions]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        questions:
          type: array
          items:
            type: object
            required: [title, Options]
            properties:
              id:
                type: integer
                minimum: 1
                description: Vorhandene Frage aktualisieren; fehlt → neue Frage
              title:
                type: string
                minLength: 1
              Options:
                type: array
                items:
                  type: object
                  required: [value]
                  properties:
                    id:
                      type: integer
                      minimum: 1
                    value:
                      type: string
                      minLength: 1

    SubmitSurveyAnswersRequest:
      type: object
      required: [surveyId, userId, selections]
      properties:
        surveyId:
          type: integer
          minimum: 1
        userId:
          type: integer
          minimum: 1
        selections:
          type: array
          minItems: 1
          items:
            type: object
            required: [questionId, optionId]
            properties:
              questionId:
                type: integer
                minimum: 1
              optionId:
                type: integer
                minimum: 1

    SubmitSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]

    SubmitSurveyError:
      type: object
      required: [success, error, message]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
          description: |
            Maschinenlesbarer Code, z. B. `user_not_found`, `survey_not_found`,
            `survey_has_no_questions`, `selection_count_mismatch`, `missing_question`,
            `duplicate_or_unknown_question`, `invalid_question`, `invalid_option_for_question`,
            `already_completed`
        message:
          type: string
          description: Deutsche Kurzbeschreibung (für UI)

    ValidationError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR]
        message:
          type: string

    UserNotFoundError:
      type: object
      required: [code]
      properties:
        code:
          type: string
          enum: [USER_NOT_FOUND]

    UserAlreadyExistsError:
      type: object
      required: [code]
      properties:
        code:
          type: string
          enum: [USER_ALREADY_EXISTS]

    InternalError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [INTERNAL_ERROR]
        message:
          type: string

    SuccessFalse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [false]

    DeleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]

    DeleteForbidden:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string

    DeleteNotFound:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
